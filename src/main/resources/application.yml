spring:
  application:
    name: hello-server
  datasource:
    driver-class-name: org.postgresql.Driver   # 显式指定 PostgreSQL 驱动
    url: jdbc:postgresql://localhost:5432/lab_db # 数据库地址
    username: postgres
    password: 123456   # 替换为你在 PgAdmin 中设置的实际密码
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  # Spring AI DashScope（Qwen 大模型）配置
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}

# MyBatis-Plus 配置：开启 SQL 日志输出，便于调试
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 相关配置
security:
  jwt:
    secret: a-very-secure-secret-key-that-is-at-least-32-bytes-long # 至少32字节的签名密钥
    expiration-millis: 7200000 # 2小时过期时间，单位毫秒
